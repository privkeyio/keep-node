name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Enumerate the flake's checks so each runs as its own isolated job below. Generated (not
  # hardcoded) so a newly added check is picked up automatically and can never silently stop
  # running in CI.
  discover:
    runs-on: ubuntu-latest
    outputs:
      checks: ${{ steps.list.outputs.checks }}
    steps:
      - uses: actions/checkout@v6
      - name: Install Nix
        # Pinned to a full commit SHA (v22) so CI never runs a mutable upstream ref.
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25
      - id: list
        run: |
          checks=$(nix eval --json '.#checks.x86_64-linux' --apply builtins.attrNames)
          echo "checks=$checks" >> "$GITHUB_OUTPUT"

  # Build the expensive shared packages ONCE and populate the cache. keep-cli (tpm-attestation +
  # bindgen) is a ~10min Rust build that single-node/oprf-unlock depend on. This job is the SOLE
  # cache saver: the per-check jobs below get an exact-key hit and therefore skip saving, so a fast
  # check (e.g. formatting, which never builds keep-cli) can't win the save race and poison the
  # shared cache with a keep-cli-less store, which is what forced oprf-unlock to cold-rebuild
  # keep-cli (~12min). On an unchanged keep pin this restores keep-cli instead of rebuilding it.
  warm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25
      - name: Nix store cache
        uses: nix-community/cache-nix-action@v6
        with:
          # Suffix the key with the run id so every run writes a FRESH cache. GitHub cache keys are
          # immutable: without this, a once-saved incomplete cache (e.g. one a fast check wrote
          # without keep-cli) can never be replaced, and warm's complete build is silently dropped
          # ("Lookup only - skipping download"). restore-prefixes then pulls the newest cache for
          # this .nix hash (the previous run's, which warm made complete), so keep-cli is restored,
          # not rebuilt. This job is the sole saver; the check jobs share this exact key (below).
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock', '**/*.nix') }}-${{ github.run_id }}
          restore-prefixes-first-match: |
            nix-${{ runner.os }}-${{ hashFiles('flake.lock', '**/*.nix') }}-
            nix-${{ runner.os }}-
      - name: Build shared packages
        run: nix build -L .#packages.x86_64-linux.keep-web .#packages.x86_64-linux.keep-cli

  # One check per job, isolated on its own runner. The suite includes several heavy QEMU guests
  # (the oprf-unlock 3-VM quorum and the OVMF/UKI measured-boot + measured-seal tests); running
  # them concurrently in a single `nix flake check` starved the runner and intermittently timed a
  # test out (an unrelated Vaultwarden crash-looping). Giving each check its own runner removes the
  # contention and keeps wall-clock ≈ the slowest single test regardless of suite size.
  check:
    needs: [discover, warm]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        check: ${{ fromJSON(needs.discover.outputs.checks) }}
    steps:
      - uses: actions/checkout@v6

      # The nixosTests boot QEMU VMs; KVM makes them fast (and avoids timeouts).
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          # trigger is async; settle so the 0666 mode is applied before the verify step reads it
          sudo udevadm settle

      # Fail fast (in seconds, with a clear message) if this runner has no usable KVM. Without
      # acceleration the VMs fall back to software emulation, run ~15x slower, and time out mid-boot
      # (the sysroot.mount timeout that flaked the ingress job). Better to fail obviously and re-run
      # onto a KVM-capable runner than to burn minutes on a mystery timeout.
      - name: Verify KVM acceleration
        run: |
          if [ ! -r /dev/kvm ] || [ ! -w /dev/kvm ]; then
            echo "::error::/dev/kvm is not accessible; VM tests would run under slow software emulation. Re-run to land a KVM-capable runner."
            ls -l /dev/kvm 2>&1 || true
            exit 1
          fi
          echo "KVM OK: $(ls -l /dev/kvm)"

      # The measured-boot/measured-seal tests build their disk image with systemd-repart (via
      # lanzaboote's image harness), which needs an unprivileged user namespace. ubuntu-latest
      # (24.04) blocks that via AppArmor, so the repart build fails with
      # "unshare: write failed /proc/self/uid_map: Operation not permitted".
      - name: Allow unprivileged user namespaces
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

      - name: Install Nix
        # Pinned to a full commit SHA (v22) so CI never runs a mutable upstream ref.
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25

      # Restore the /nix/store cache the `warm` job wrote THIS run (same run-id-suffixed key -> exact
      # hit), so keep-web/keep-cli are reused, not rebuilt. The exact hit also makes cache-nix-action
      # skip the post-run save, so warm stays the sole saver and these parallel jobs never race to
      # write (poison) the cache.
      - name: Nix store cache
        uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock', '**/*.nix') }}-${{ github.run_id }}
          restore-prefixes-first-match: |
            nix-${{ runner.os }}-${{ hashFiles('flake.lock', '**/*.nix') }}-
            nix-${{ runner.os }}-

      - name: Build check
        run: nix build -L '.#checks.x86_64-linux.${{ matrix.check }}'
