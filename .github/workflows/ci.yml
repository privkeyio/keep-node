name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # The M0 nixosTest boots a QEMU VM; KVM makes it fast (and avoids timeouts).
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # The measured-boot test builds its disk image with systemd-repart (via lanzaboote's
      # image harness), which needs an unprivileged user namespace. ubuntu-latest (24.04)
      # blocks that via AppArmor, so the repart build fails with
      # "unshare: write failed /proc/self/uid_map: Operation not permitted".
      - name: Allow unprivileged user namespaces
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

      - name: Install Nix
        # Pinned to a full commit SHA (v22) so CI never runs a mutable upstream ref.
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25

      # Cache /nix/store so keep-web (built from privkeyio/keep) isn't recompiled every run.
      - name: Nix store cache
        uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock', '**/*.nix') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-

      # Builds packages (keep-web) and runs the checks (VM tests + eval guards).
      # --max-jobs 1 serializes the builds so only ONE nixosTest runs at a time. The suite now
      # includes several heavy QEMU guests (the oprf-unlock 3-VM quorum and the OVMF/UKI
      # measured-boot + measured-seal tests); running them concurrently starves the runner's
      # CPU/RAM and intermittently makes an unrelated test's Vaultwarden crash-loop into a 900s
      # timeout. Serializing trades wall-clock for reliability. (If CI speed becomes a problem,
      # split the checks into a per-check job matrix so each runs isolated on its own runner.)
      - name: Flake check
        run: nix flake check -L --max-jobs 1
