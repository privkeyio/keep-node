name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

# Key by PR number (stable across pushes to the same PR) so a new push reliably cancels the
# still-running previous run instead of leaving two live runs fighting for the same runner slot.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Enumerate the flake's checks so each runs as its own isolated job below. Generated (not
  # hardcoded) so a newly added check is picked up automatically and can never silently stop
  # running in CI. The `nix eval` here evaluates the whole flake, so a syntax/eval error in ANY
  # module fails this job (and the run) regardless of which checks the fast lane selects below.
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      checks: ${{ steps.list.outputs.checks }}
    steps:
      - uses: actions/checkout@v6
      - name: Install Nix
        # Pinned to a full commit SHA (v22) so CI never runs a mutable upstream ref.
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25
      - id: list
        # The 16 checks are heavy QEMU VM tests; running the whole matrix on every PR push saturates
        # the shared GitHub-hosted concurrency pool (starving other repos) and serializes into a long
        # wall-clock. So: full matrix only on push to main, manual dispatch, or a PR labelled `full-ci`
        # (always fully gating merges); a fast representative subset on ordinary PR pushes.
        env:
          FULL: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'full-ci') }}
        run: |
          all=$(nix eval --json '.#checks.x86_64-linux' --apply builtins.attrNames)
          if [ "$FULL" = "true" ]; then
            checks="$all"
          else
            checks=$(printf '%s' "$all" \
              | jq -c '[.[] | select(. == "formatting" or . == "single-node" or . == "mesh-admin-ssh")]')
          fi
          echo "checks=$checks" >> "$GITHUB_OUTPUT"

  # Build the expensive shared packages once and PUSH them to the `privkey` Cachix binary cache, so
  # the per-check jobs substitute keep-web/keep-cli instead of cold-rebuilding them. keep-cli
  # (tpm-attestation + bindgen) is a ~10min Rust build that oprf-unlock depends on; keep-web is what
  # single-node consumes. Neither is on cache.nixos.org (both are built from the pinned keep source).
  # Cachix is a real Nix substituter: it registers store paths validly, unlike the GitHub
  # tar-of-/nix/store cache we replaced, which restored incompletely (tar permission errors) and
  # forced rebuilds. Runs only on `push` to main so the Cachix write token never enters a PR build
  # (a PR could otherwise exfiltrate it via the build step): PR check jobs pull anonymously from what
  # main populated and cold-build on a miss. This is the SOLE pusher; check jobs skip pushing, so
  # they never upload the large per-check VM-test outputs.
  warm:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25
      - name: Cachix (push privkey)
        # Pinned to a full commit SHA (v15) so CI never runs a mutable upstream ref; this action
        # handles the write token, so an upstream re-tag must not silently change its code.
        uses: cachix/cachix-action@ad2ddac53f961de1989924296a1f236fcfbaa4fc
        with:
          name: privkey
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Build and push shared packages
        run: nix build -L .#packages.x86_64-linux.keep-web .#packages.x86_64-linux.keep-cli

  # One check per job, isolated on its own runner. The suite includes several heavy QEMU guests
  # (the oprf-unlock 3-VM quorum and the OVMF/UKI measured-boot + measured-seal tests); running
  # them concurrently in a single `nix flake check` starved the runner and intermittently timed a
  # test out (an unrelated Vaultwarden crash-looping). Giving each check its own runner removes the
  # contention and keeps wall-clock ≈ the slowest single test regardless of suite size.
  check:
    needs: [discover, warm]
    # warm only runs on push (it holds the cache write token) and is skipped on PRs; it can also fail
    # on a transient Cachix outage. always() keeps the checks running regardless of warm's result —
    # they pull from the cache and cold-build on a miss — so a skipped/failed warm never blocks the
    # suite or reports a false green. Still gate on discover, whose matrix output the checks consume.
    if: ${{ always() && needs.discover.result == 'success' }}
    runs-on: ubuntu-latest
    # Hard ceiling per check: a VM test that hangs (KVM flake, VM never boots) is killed in minutes
    # instead of holding a runner slot for GitHub's 6-hour default and starving everything behind it.
    timeout-minutes: 30
    strategy:
      fail-fast: false
      # Cap how many checks run at once so a full-matrix run leaves slots in the shared runner pool for
      # other repos, rather than occupying the entire account concurrency budget.
      max-parallel: 6
      matrix:
        check: ${{ fromJSON(needs.discover.outputs.checks) }}
    steps:
      - uses: actions/checkout@v6

      # The nixosTests boot QEMU VMs; KVM makes them fast (and avoids timeouts).
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          # trigger is async; settle so the 0666 mode is applied before the verify step reads it
          sudo udevadm settle

      # Fail fast (in seconds, with a clear message) if this runner has no usable KVM. Without
      # acceleration the VMs fall back to software emulation, run ~15x slower, and time out mid-boot
      # (the sysroot.mount timeout that flaked the ingress job). Better to fail obviously and re-run
      # onto a KVM-capable runner than to burn minutes on a mystery timeout.
      - name: Verify KVM acceleration
        run: |
          if [ ! -r /dev/kvm ] || [ ! -w /dev/kvm ]; then
            echo "::error::/dev/kvm is not accessible; VM tests would run under slow software emulation. Re-run to land a KVM-capable runner."
            ls -l /dev/kvm 2>&1 || true
            exit 1
          fi
          echo "KVM OK: $(ls -l /dev/kvm)"

      # The measured-boot/measured-seal tests build their disk image with systemd-repart (via
      # lanzaboote's image harness), which needs an unprivileged user namespace. ubuntu-latest
      # (24.04) blocks that via AppArmor, so the repart build fails with
      # "unshare: write failed /proc/self/uid_map: Operation not permitted".
      - name: Allow unprivileged user namespaces
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

      - name: Install Nix
        # Pinned to a full commit SHA (v22) so CI never runs a mutable upstream ref.
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25

      # Pull keep-web/keep-cli from the `privkey` Cachix cache the warm job pushed, so they are
      # substituted, not rebuilt. Public cache -> no auth needed; skipPush so these jobs never
      # upload their (large, non-reusable) VM-test outputs.
      - name: Cachix (pull privkey)
        # Pinned to a full commit SHA (v15) so CI never runs a mutable upstream ref.
        uses: cachix/cachix-action@ad2ddac53f961de1989924296a1f236fcfbaa4fc
        with:
          name: privkey
          skipPush: true

      - name: Build check
        run: nix build -L '.#checks.x86_64-linux.${{ matrix.check }}'
